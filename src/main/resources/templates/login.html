<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FocusTrack - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #667eea; font-size: 32px; }
        .logo p { color: #888; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .link { text-align: center; margin-top: 20px; color: #888; }
        .link a { color: #667eea; text-decoration: none; }
        .error {
            background: #ffe0e0;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
        }
        .success {
            background: #e0ffe0;
            color: #060;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1> FocusTrack</h1>
        <p>Smart Productivity & Goal Tracking</p>
    </div>
    <div th:if="${param.error}" class="error">
        Invalid email or password!
    </div>
    <div th:if="${param.registered}" class="success">
        Registered successfully! Please login.
    </div>
    <form th:action="@{/login}" method="post">
        <input type="email" name="username"
               placeholder="Email address" required/>
        <input type="password" name="password"
               placeholder="Password" required/>
        <button type="submit">Login</button>
    </form>
    <div class="link">
        Don't have an account? <a href="/register">Register here</a>
    </div>
</div>
</body>
</html>
